function genId() { return Math.random().toString(36).slice(2,9); }

function fmtCd(sec) {
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  return h>0
    ? h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")
    : String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function buildRanking(subs, qid, gender) {
  const vk = gender==="male" ? "maleVote" : "femaleVote";
  const cnt = {};
  Object.values(subs).forEach(s => {
    const v = s.answers && s.answers[qid] && s.answers[qid][vk];
    if(v) cnt[v] = (cnt[v]||0)+1;
  });
  const sorted = Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const res=[]; let rank=0, last=-1;
  for(const [name,score] of sorted){
    if(score!==last){rank++;last=score;}
    if(rank>3) break;
    res.push({rank,name,score});
  }
  while(res.length<3) res.push({rank:res.length+1, name:"--", score:0});
  return res;
}

function weightedLottery(participants, penalized, count) {
  const pool=[];
  for(const name of participants){ const w=penalized.includes(name)?1:8; for(let i=0;i<w;i++) pool.push(name); }
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const winners=[], seen=new Set();
  for(const name of shuffled){ if(!seen.has(name)){seen.add(name);winners.push(name);} if(winners.length>=count) break; }
  return winners;
}

// ─── CandidateInput（1件追加用）────────────────
function CandidateInput({ bgColor, onAdd }) {
  const [val, setVal] = useState("");
  const submit = () => { const t=val.trim(); if(t){onAdd(t);setVal("");} };
  return (
    <div className="flex gap-2">
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}
        className="flex-1 px-4 py-2 bg-slate-50 rounded-xl font-bold outline-none border-2 border-slate-100 focus:border-indigo-300 transition-all text-sm" placeholder="名前を追加"/>
      <button onClick={submit} className={"px-4 rounded-xl "+bgColor+" text-white flex items-center justify-center"}><I.Plus/></button>
    </div>
  );
}

    <div className={"text-center p-3 rounded-xl "+(isFirst?"bg-amber-50 border-2 border-amber-200":"bg-slate-50")}>
      <div className="text-xs font-black text-slate-400">{res.rank}位</div>
      {isFirst && <div className="text-base">👑</div>}
      <div className={"font-black text-sm break-all "+(res.name==="--"?"text-slate-200":isFirst?(accentClass||"text-amber-700"):"text-slate-700")}>{res.name}</div>
      {res.name!=="--" && <div className="text-[10px] font-black text-slate-400">{res.score}票</div>}
    </div>
  );
}

// ─── LotteryWidget ───────────────────────────
function LotteryWidget({rolling, winners}) {
  if(rolling) return (
    <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-[2.5rem] p-1 shadow-2xl">
      <div className="bg-amber-50 rounded-[2.2rem] p-8 text-center space-y-5">
        <div className="flex justify-center">
          <div className="relative w-20 h-20">
            <div className="anim-garapon-spin absolute inset-0 flex items-center justify-center">
              <svg className="w-16 h-16 text-amber-500" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
              </svg>
            </div>
            <div className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full anim-drum-roll"/>
            <div className="absolute -bottom-1 -left-1 w-4 h-4 bg-amber-600 rounded-full anim-drum-roll" style={{animationDelay:"0.1s"}}/>
          </div>
        </div>
        <p className="text-amber-700 font-black text-sm tracking-widest uppercase">🎲 抽選中 🎲</p>
        <div className="min-h-[60px] flex flex-col items-center justify-center gap-2">
          <div className="flex gap-2">
            {[0,1,2].map(i=><div key={i} className="w-3 h-3 rounded-full bg-amber-400 anim-drum-roll" style={{animationDelay:`${i*0.15}s`}}/>)}
          </div>
          <p className="text-amber-400 font-black text-xs tracking-widest">selecting...</p>
        </div>
        <div className="w-full h-2 bg-amber-200 rounded-full overflow-hidden">
          <div className="anim-slide-bar h-full w-1/3 bg-gradient-to-r from-amber-500 to-orange-500 rounded-full"/>
        </div>
      </div>
    </div>
  );
  if(!winners || !winners.length) return null;
  return (
    <div className="anim-winner-pop">
      <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-[2.5rem] p-1 shadow-2xl">
        <div className="bg-amber-50 rounded-[2.2rem] p-8 text-center space-y-4">
          <div className="text-4xl anim-bounce-in">🎉</div>
          <p className="text-amber-600 font-black text-xs tracking-[0.3em] uppercase">✨ Lucky Winner ✨</p>
          {winners.map((w,i)=>(
            <div key={i} className="anim-winner-pop" style={{animationDelay:`${i*0.15}s`}}>
              <span className="text-5xl font-black text-amber-900 block">{w.nickname}</span>
              <span className="text-base font-black text-amber-600">様</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────
function App() {
  const [mode,           setMode]           = useState("vote");
  const [adminUnlocked,  setAdminUnlocked]  = useState(false);
  const [passwordInput,  setPasswordInput]  = useState("");
  const [dbReady,        setDbReady]        = useState(false);

  // Firebase state
  const [gameOpen,       setGameOpen]       = useState(false);
  const [questions,      setQuestions]      = useState(DEFAULT_QS);
  const [candidates,     setCandidates]     = useState({c11m:[],c12m:[],c11f:[],c12f:[]});
  const [submissions,    setSubmissions]    = useState({});    // {safeKey:{nickname,answers:{qid:{maleVote,femaleVote}}}}
  const [subKeys,        setSubKeys]        = useState({});    // {safeKey:true}
  const [resultsOpen,    setResultsOpen]    = useState(false);
  const [revealIndex,    setRevealIndex]    = useState(0);
  const [lotteryWinners, setLotteryWinners] = useState({});    // {qid:[{nickname}]}
  const [penalized,      setPenalized]      = useState([]);
  const [winnerCount,    setWinnerCount]    = useState(1);
  const [revealAt,       setRevealAt]       = useState(null);
  const [label,          setLabel]          = useState("Election");

  // Local state
  const [lockedNickname, setLockedNickname] = useState(()=>localStorage.getItem("myNickname_s1")||null);
  const [nicknameInput,  setNicknameInput]  = useState("");
  const [currentStep,    setCurrentStep]    = useState(0);
  const [localAnswers,   setLocalAnswers]   = useState({});   // {qid:{maleVote,femaleVote}}
  const [revealCd,       setRevealCd]       = useState(null);
  const [isRevealing,    setIsRevealing]    = useState(false); // 5秒カウント中
  const [lotteryQid,     setLotteryQid]     = useState(null);  // 抽選中のqid
  const [showFinal,      setShowFinal]      = useState(false);
  const [aiComment,      setAiComment]      = useState("");
  const [aiLoading,      setAiLoading]      = useState(false);
  const [isSaving,       setIsSaving]       = useState(false);

  // Admin local state
  const [adminColTab,    setAdminColTab]    = useState("c11m");
  const [bulkModal,      setBulkModal]      = useState({show:false, colId:"c11m", text:""});
  const [editQId,        setEditQId]        = useState(null);
  const [editQText,      setEditQText]      = useState("");
  const [newQTitle,      setNewQTitle]      = useState("");
  const [tempLabel,      setTempLabel]      = useState("Election");
  const [tempDate,       setTempDate]       = useState("");
  const [tempTime,       setTempTime]       = useState("");
  const [showResetModal, setShowResetModal] = useState(false);

  const finalRef = useRef(null);
  const prevResultsOpen = useRef(false);

  // localStorage sync
  useEffect(()=>{
    if(lockedNickname) localStorage.setItem("myNickname_s1", lockedNickname);
    else localStorage.removeItem("myNickname_s1");
  },[lockedNickname]);

  // Firebase listeners
  useEffect(()=>{
    const refs=[];
    const sub=(key,fn)=>{ const r=db.ref(key); r.on("value",s=>fn(s.val())); refs.push(r); };
    sub(FK.GAME,      v=>setGameOpen(!!v));
    sub(FK.QUESTIONS, v=>{ if(v){ const a=Array.isArray(v)?v:Object.values(v); setQuestions(a.map(q=>({id:q.id,title:q.title}))); }});
    sub(FK.SUBS,      v=>setSubmissions(v||{}));
    sub(FK.SUB_KEYS,  v=>setSubKeys(v||{}));
    sub(FK.RESULTS,   v=>setResultsOpen(!!v));
    sub(FK.REV_IDX,   v=>setRevealIndex(typeof v==="number"?v:0));
    sub(FK.LOTTERY,   v=>setLotteryWinners(v||{}));
    sub(FK.PENALIZED, v=>setPenalized(!v?[]:Array.isArray(v)?v:Object.values(v)));
    sub(FK.WIN_COUNT, v=>{ if(v!==null) setWinnerCount(v); });
    sub(FK.REVEAL_AT, v=>setRevealAt(v||null));
    sub(FK.LABEL,     v=>{ if(v){setLabel(v);setTempLabel(v);} });
    COLS.forEach(col=>{
      const r=db.ref(col.sk);
      r.on("value",s=>setCandidates(prev=>({...prev,[col.id]:s.val()?Array.isArray(s.val())?s.val():Object.values(s.val()):[]})));
      refs.push(r);
    });
    db.ref(FK.GAME).once("value",()=>setDbReady(true));
    return ()=>refs.forEach(r=>r.off());
  },[]);

  // ゲームクローズ時にニックネーム解除
  useEffect(()=>{
    if(!gameOpen){ setLockedNickname(null); setNicknameInput(""); setCurrentStep(0); setLocalAnswers({}); }
  },[gameOpen]);

  // カウントダウン
  useEffect(()=>{
    if(!revealAt||resultsOpen){setRevealCd(null);return;}
    const calc=()=>setRevealCd(Math.max(0,Math.floor((revealAt-Date.now())/1000)));
    calc(); const iv=setInterval(calc,500); return ()=>clearInterval(iv);
  },[revealAt,resultsOpen]);

  // 結果公開時に1位を自動ペナルティ
  useEffect(()=>{
    if(resultsOpen && !prevResultsOpen.current && Object.keys(submissions).length>0){
      const fp=[];
      questions.forEach(q=>{
        ["male","female"].forEach(g=>{
          buildRanking(submissions,q.id,g).filter(r=>r.rank===1&&r.name!=="--").forEach(r=>{ if(!fp.includes(r.name)) fp.push(r.name); });
        });
      });
      if(fp.length) db.ref(FK.PENALIZED).set([...new Set([...penalized,...fp])]);
    }
    prevResultsOpen.current = resultsOpen;
  },[resultsOpen]);

  // Computed
  const safeKey      = (lockedNickname||"").replace(/[.#$[\]/]/g,"_");
  const hasSubmitted = !!subKeys[safeKey];
  const subCount     = Object.keys(subKeys).length;
  const totalQ       = questions.length;
  const curQ         = questions[currentStep]||null;
  const curAns       = curQ?(localAnswers[curQ.id]||{}):{};
  const ansOk        = !!(curAns.maleVote && curAns.femaleVote);

  const setAns=(qid,gender,name)=>{
    setLocalAnswers(prev=>({
      ...prev,
      [qid]: gender==="male"
        ? {...(prev[qid]||{}), maleVote:name}
        : {...(prev[qid]||{}), femaleVote:name}
    }));
  };

  const getQWinners=qid=>lotteryWinners[qid]?(Array.isArray(lotteryWinners[qid])?lotteryWinners[qid]:Object.values(lotteryWinners[qid])):[];

  // ── Actions ──────────────────────────────
  const handleAdminLogin=()=>{
    if(passwordInput===ADMIN_PASSWORD){setAdminUnlocked(true);setPasswordInput("");}
    else alert("パスワードが違います");
  };

  const handleCloseGame=()=>{
    db.ref(FK.GAME).set(false);
    db.ref(FK.SUB_KEYS).set(null);
    db.ref(FK.SUBS).set(null);
    db.ref(FK.LOTTERY).set(null);
    db.ref(FK.RESULTS).set(false);
    db.ref(FK.REV_IDX).set(0);
    db.ref(FK.PENALIZED).set(null);
  };

  const handleReset=()=>{
    db.ref(FK.SUBS).set(null);
    db.ref(FK.SUB_KEYS).set(null);
    db.ref(FK.LOTTERY).set(null);
    db.ref(FK.RESULTS).set(false);
    db.ref(FK.REV_IDX).set(0);
    setShowFinal(false); setAiComment(""); setShowResetModal(false);
  };

  const submitAll=()=>{
    const name=(lockedNickname||nicknameInput).trim();
    if(!name){alert("ニックネームを入力してください");return;}
    const k=name.replace(/[.#$[\]/]/g,"_");
    if(subKeys[k]){alert("このニックネームは既に使われています");return;}
    if(!lockedNickname) setLockedNickname(name);
    db.ref(FK.SUBS+"/"+k).set({nickname:name, answers:localAnswers});
    db.ref(FK.SUB_KEYS+"/"+k).set(true);
  };

  const revealNext=()=>{
    if(isRevealing) return;
    setIsRevealing(true);
    setTimeout(()=>{ db.ref(FK.REV_IDX).set(revealIndex+1); setIsRevealing(false); },5000);
  };

  const runLottery=qid=>{
    if(!Object.keys(submissions).length){alert("回答データがありません");return;}
    if(lotteryQid) return;
    const mTop=buildRanking(submissions,qid,"male")[0];
    const fTop=buildRanking(submissions,qid,"female")[0];
    const pool=[...new Set(Object.values(submissions).filter(s=>{
      const a=s.answers&&s.answers[qid]; if(!a) return false;
      return (mTop.name!=="--"&&a.maleVote===mTop.name)||(fTop.name!=="--"&&a.femaleVote===fTop.name);
    }).map(s=>s.nickname))];
    if(!pool.length){alert("1位に投票した人がいません");return;}
    setLotteryQid(qid);
    db.ref(FK.LOTTERY+"/"+qid).set(null);
    setTimeout(()=>{
      const winners=weightedLottery(pool,penalized,winnerCount);
      db.ref(FK.LOTTERY+"/"+qid).set(winners.map(n=>({nickname:n})));
      db.ref(FK.PENALIZED).set([...new Set([...penalized,...winners])]);
      setLotteryQid(null);
    },3000);
  };

  const fetchAI=async()=>{
    setAiLoading(true); setAiComment("");
    try{
      const rankStr=questions.map((q,i)=>{
        const mr=buildRanking(submissions,q.id,"male");
        const fr=buildRanking(submissions,q.id,"female");
        const ms=mr.filter(r=>r.name!=="--").map(r=>r.rank+"位:"+r.name+"("+r.score+"票)").join(" ");
        const fs=fr.filter(r=>r.name!=="--").map(r=>r.rank+"位:"+r.name+"("+r.score+"票)").join(" ");
        const qw=getQWinners(q.id).map(w=>w.nickname).join("・")||"未抽選";
        return "Q"+(i+1)+"「"+q.title+"」\n  男性: "+ms+"\n  女性: "+fs+"\n  当選: "+qw;
      }).join("\n\n");
      const voterStr=Object.values(submissions).map(s=>{
        const a=questions.map(q=>{ const ans=s.answers&&s.answers[q.id]; return ans?"["+q.title.slice(0,8)+"→男:"+(ans.maleVote||"?")+"/女:"+(ans.femaleVote||"?")+"]":""; }).filter(Boolean).join(" ");
        return s.nickname+": "+a;
      }).join("\n");
      const prompt="あなたは同窓会の盛り上げ上手な司会者です。以下の投票結果をすべて読んで、面白おかしく温かい総評コメントを300字程度で書いてください。\nポイント：\n- 票数の接戦・圧勝・満場一致にガンガンツッコむ\n- 票が集中している人は「さすが！」「みんな分かってる！」と大げさに盛り上げる\n- 抽選当選者を祝福しつつ少しいじる\n- 「あのころ」「卒業してから」など同窓会らしい懐かし感\n- 最後は全員への感謝と一言で締める\n\n【投票者数】"+Object.keys(submissions).length+"名\n\n【結果】\n"+rankStr+"\n\n【投票内容】\n"+voterStr;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      setAiComment(data.content?.map(b=>b.text||"").join("")||"総評を取得できませんでした。");
    }catch(e){setAiComment("総評の取得に失敗しました。");}
    setAiLoading(false);
  };

  const saveImage=async()=>{
    if(!finalRef.current||isSaving) return;
    setIsSaving(true);
    try{
      const cv=await html2canvas(finalRef.current,{backgroundColor:"#f8fafc",scale:2,useCORS:true,logging:false});
      const a=document.createElement("a");
      a.download="同窓会結果_"+new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")+".png";
      a.href=cv.toDataURL("image/png"); a.click();
    }catch(e){alert("画像の保存に失敗しました");}
    setIsSaving(false);
  };

  // お題管理
  const saveQs=qs=>db.ref(FK.QUESTIONS).set(qs);
  const addQ=()=>{ if(!newQTitle.trim())return; saveQs([...questions,{id:genId(),title:newQTitle.trim()}]); setNewQTitle(""); };
  const removeQ=id=>saveQs(questions.filter(q=>q.id!==id));
  const moveQ=(i,d)=>{ const qs=[...questions],t=i+d; if(t<0||t>=qs.length)return; [qs[i],qs[t]]=[qs[t],qs[i]]; saveQs(qs); };
  const saveQTitle=(id,title)=>{ saveQs(questions.map(q=>q.id===id?{...q,title}:q)); setEditQId(null); };

  // 候補者管理
  const addCandidate=(colId,name)=>{ if(!name.trim())return; db.ref(COLS.find(c=>c.id===colId).sk).set([...(candidates[colId]||[]),name.trim()]); };
  const removeCandidate=(colId,i)=>{ db.ref(COLS.find(c=>c.id===colId).sk).set(candidates[colId].filter((_,j)=>j!==i)); };
  const moveCandidate=(colId,i,d)=>{
    const list=[...(candidates[colId]||[])], t=i+d;
    if(t<0||t>=list.length) return;
    [list[i],list[t]]=[list[t],list[i]];
    db.ref(COLS.find(c=>c.id===colId).sk).set(list);
  };
  const processBulk=()=>{
    const names=bulkModal.text.split(/[,\n、，]/).map(n=>n.trim()).filter(Boolean);
    if(!names.length) return;
    db.ref(COLS.find(c=>c.id===bulkModal.colId).sk).set([...new Set([...(candidates[bulkModal.colId]||[]),...names])]);
    setBulkModal({show:false,colId:"c11m",text:""});
  };

  const setRevDT=()=>{
    if(!tempDate||!tempTime){alert("日付と時刻を入力してください");return;}
    const ms=new Date(tempDate+"T"+tempTime).getTime();
    if(isNaN(ms)){alert("正しい日時を入力してください");return;}
    db.ref(FK.REVEAL_AT).set(ms);
  };

  if(!dbReady) return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4 text-slate-400">
      <div className="anim-pulse-scale w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center">
        <svg className="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"/></svg>
      </div>
      <p className="font-black text-sm">Firebase に接続中...</p>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-50 p-2 md:p-8 font-sans text-slate-900">

      {/* Nav */}
      <nav className="max-w-3xl mx-auto flex justify-around mb-6 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 sticky top-2 z-50">
        {[
          {id:"vote",   Icon:I.Vote,     label:"投票",  active:"bg-indigo-600"},
          {id:"screen", Icon:I.Monitor,  label:"結果",  active:"bg-blue-600"},
          {id:"admin",  Icon:I.Settings, label:"管理",  active:"bg-green-600"},
        ].map(item=>(
          <button key={item.id} onClick={()=>setMode(item.id)}
            className={"flex flex-col items-center flex-1 py-2 rounded-xl transition-all "+(mode===item.id?item.active+" text-white shadow-md":"text-slate-400 hover:bg-slate-50")}>
            <item.Icon/><span className="text-[10px] font-bold mt-1 uppercase">{item.label}</span>
          </button>
        ))}
      </nav>

      <div className="max-w-3xl mx-auto">

        {/* ══ 投票ページ ══ */}
        {mode==="vote" && (
          <div className="anim-fade-in-up">
            {!gameOpen ? <MaintenanceScreen/> : hasSubmitted ? (
              // 提出済み
              <div className="shadow-xl rounded-3xl bg-white overflow-hidden">
                <header className="bg-indigo-600 p-8 text-white text-center">
                  <h1 className="text-xs font-bold opacity-60 mb-2 uppercase tracking-widest">{label}</h1>
                  <h2 className="text-3xl font-black">回答を提出しました</h2>
                </header>
                <div className="p-10 text-center space-y-5">
                  <I.Check/>
                  <h3 className="text-2xl font-black text-slate-800">提出完了！</h3>
                  <p className="text-slate-500 font-bold">結果発表をお待ちください</p>
                  {revealAt && !resultsOpen && revealCd!==null && (
                    <div className="bg-indigo-50 rounded-2xl p-5 text-indigo-700">
                      <p className="text-xs font-black uppercase tracking-widest mb-2">結果発表まで</p>
                      <p className="text-4xl font-black tabular-nums">{fmtCd(revealCd)}</p>
                    </div>
                  )}
                </div>
              </div>
            ) : (
              // 投票フォーム（ステップ式）
              <div className="shadow-xl overflow-hidden rounded-3xl bg-white">
                <header className="bg-indigo-600 p-8 text-white text-center">
                  <h1 className="text-xs font-bold opacity-60 mb-2 uppercase tracking-widest">{label}</h1>
                  <h2 className="text-3xl font-black italic">{curQ?curQ.title:"お題がありません"}</h2>
                  <p className="text-indigo-200 text-xs mt-2 font-bold">{currentStep+1} / {totalQ}</p>
                </header>
                {/* プログレスバー */}
                <div className="h-1.5 bg-slate-100">
                  <div className="h-full bg-indigo-400 transition-all duration-500" style={{width:((currentStep/totalQ)*100)+"%"}}/>
                </div>
                <div className="p-4 md:p-8 space-y-6">
                  {/* ニックネーム（ステップ0のみ） */}
                  {currentStep===0 && (
                    <div className="space-y-2 text-center">
                      <label className="text-xs font-black text-slate-400 uppercase tracking-widest">
                        {lockedNickname?"🔒 ゲーム終了まで変更できません":"ゲーム内で使用するニックネームを入力してください"}
                      </label>
                      {lockedNickname ? (
                        <div className="w-full p-4 bg-indigo-50 border-2 border-indigo-200 rounded-2xl font-black text-xl text-indigo-700 flex items-center justify-center gap-2">
                          <I.LockSm/>{lockedNickname}
                        </div>
                      ) : (
                        <>
                          <input value={nicknameInput} onChange={e=>setNicknameInput(e.target.value)}
                            className={"w-full p-4 bg-slate-50 border-2 rounded-2xl transition-all text-center font-bold text-lg outline-none "+(nicknameInput.trim()&&subKeys[nicknameInput.trim().replace(/[.#$[\]/]/g,"_")]?"border-red-400 bg-red-50":"border-slate-100 focus:border-indigo-500")}
                            placeholder="あなたのニックネーム"/>
                          {nicknameInput.trim()&&subKeys[nicknameInput.trim().replace(/[.#$[\]/]/g,"_")]&&(
                            <p className="text-red-500 font-black text-xs">このニックネームは既に使われています</p>
                          )}
                          {nicknameInput.trim()&&!subKeys[nicknameInput.trim().replace(/[.#$[\]/]/g,"_")]&&(
                            <p className="text-[10px] text-slate-400 font-bold">※ 提出するとゲームクローズまで名前が固定されます</p>
                          )}
                        </>
                      )}
                    </div>
                  )}

                  {/* 男性部門 */}
                  {curQ && (
                    <div className="space-y-2">
                      <div className="flex items-center gap-2"><span className="text-lg">🦖</span><p className="text-indigo-700 font-black text-sm">男性部門</p></div>
                      <div className="grid grid-cols-2 gap-3">
                        {COLS.filter(c=>c.gender==="male").map(col=>(
                          <div key={col.id} className="space-y-1">
                            <div className={"text-center text-[11px] font-black py-1 px-2 rounded-lg "+col.colorCls.bg+" text-white tracking-widest"}>{col.label}</div>
                            <div className="flex flex-col gap-1 max-h-52 overflow-y-auto sb">
                              {(candidates[col.id]||[]).map(name=>(
                                <button key={name} onClick={()=>setAns(curQ.id,"male",name)}
                                  className={"w-full p-2.5 rounded-xl text-xs font-bold transition-all border-2 text-left "+(curAns.maleVote===name?col.colorCls.sel+" text-white shadow-md":"bg-white border-slate-100 text-slate-600 "+col.colorCls.hover)}>
                                  {name}
                                </button>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* 女性部門 */}
                  {curQ && (
                    <div className="space-y-2">
                      <div className="flex items-center gap-2"><span className="text-lg">🎀</span><p className="text-pink-600 font-black text-sm">女性部門</p></div>
                      <div className="grid grid-cols-2 gap-3">
                        {COLS.filter(c=>c.gender==="female").map(col=>(
                          <div key={col.id} className="space-y-1">
                            <div className={"text-center text-[11px] font-black py-1 px-2 rounded-lg "+col.colorCls.bg+" text-white tracking-widest"}>{col.label}</div>
                            <div className="flex flex-col gap-1 max-h-52 overflow-y-auto sb">
                              {(candidates[col.id]||[]).map(name=>(
                                <button key={name} onClick={()=>setAns(curQ.id,"female",name)}
                                  className={"w-full p-2.5 rounded-xl text-xs font-bold transition-all border-2 text-left "+(curAns.femaleVote===name?col.colorCls.sel+" text-white shadow-md":"bg-white border-slate-100 text-slate-600 "+col.colorCls.hover)}>
                                  {name}
                                </button>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* ナビゲーション */}
                  <div className="space-y-3 pt-2">
                    {currentStep < totalQ-1 ? (
                      <button onClick={()=>{ if(!ansOk){alert("男女両方選択してください");return;} setCurrentStep(s=>s+1); }}
                        disabled={!ansOk}
                        className="w-full h-16 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-20 text-white rounded-2xl text-xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                        次のお題へ <I.ChevR/>
                      </button>
                    ) : (
                      <button onClick={submitAll}
                        disabled={!ansOk||(!lockedNickname&&!nicknameInput.trim())}
                        className="w-full h-16 bg-green-600 hover:bg-green-700 disabled:opacity-20 text-white rounded-2xl text-xl font-black shadow-lg active:scale-95 transition-all">
                        ✅ アンケート結果を提出する
                      </button>
                    )}
                    {currentStep>0 && (
                      <button onClick={()=>setCurrentStep(s=>s-1)} className="w-full h-10 text-slate-400 rounded-2xl text-sm font-bold hover:bg-slate-100 transition-all">
                        ← 前のお題に戻る
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ 結果ページ ══ */}
        {mode==="screen" && (
          <div className="anim-fade-in">
            {!gameOpen ? <MaintenanceScreen/> : (
              <div className="shadow-xl rounded-3xl overflow-hidden bg-white">
                <header className="bg-blue-600 p-8 text-white text-center">
                  <h2 className="text-3xl font-black italic">{label}</h2>
                  <p className="text-[10px] font-bold opacity-60 mt-2 uppercase tracking-[0.3em]">Official Results</p>
                </header>
                <div className="p-6 md:p-10 space-y-10">

                  {/* 集計中 */}
                  {!resultsOpen && (
                    <div className="text-center py-6 space-y-8">
                      <div className="anim-spin-slow text-slate-200 flex justify-center">
                        <svg className="w-16 h-16" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
                        </svg>
                      </div>
                      <p className="text-slate-400 font-black text-xl">現在集計中です...</p>
                      <div className="relative inline-block">
                        <div className="absolute -inset-1 bg-gradient-to-r from-blue-400 to-indigo-400 rounded-[2.5rem] blur opacity-25"/>
                        <div className="relative bg-white rounded-[2rem] p-8 border border-slate-100 shadow-xl min-w-[280px]">
                          <p className="text-blue-600 font-black text-[10px] uppercase tracking-[0.25em] mb-4 flex items-center justify-center gap-2"><I.Trend/> Live Status</p>
                          <div className="flex items-center justify-center gap-4">
                            <div className="bg-blue-50 p-4 rounded-2xl text-blue-500"><I.Users2/></div>
                            <div className="text-left">
                              <div className="flex items-baseline gap-1">
                                <span key={subCount} className="anim-count-up text-6xl font-black text-slate-800 tabular-nums leading-none">{subCount}</span>
                                <span className="text-xl font-black text-slate-400">名</span>
                              </div>
                              <p className="text-slate-400 text-[10px] font-bold mt-1 uppercase tracking-wider">が回答を提出しました</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      {revealAt && revealCd!==null && (
                        <div className="bg-indigo-50 rounded-2xl p-6 space-y-2">
                          <p className="text-indigo-500 font-black text-xs uppercase tracking-widest">結果発表まで</p>
                          <p className={"font-black text-indigo-700 tabular-nums "+(revealCd<=60?"text-4xl anim-pulse-scale":"text-5xl")}>{fmtCd(revealCd)}</p>
                        </div>
                      )}
                    </div>
                  )}

                  {/* 結果発表 */}
                  {resultsOpen && !showFinal && (()=>{
                    const q=questions[revealIndex]; if(!q) return null;
                    const mr=buildRanking(submissions,q.id,"male");
                    const fr=buildRanking(submissions,q.id,"female");
                    const rolling=lotteryQid===q.id;
                    const qw=getQWinners(q.id);
                    const isLast=revealIndex>=questions.length-1;
                    return (
                      <div className="space-y-8 anim-reveal-in">
                        <div className="text-center">
                          <p className="text-blue-500 font-black text-[10px] uppercase tracking-widest mb-1">Q{revealIndex+1} / {questions.length}</p>
                          <h3 className="text-2xl font-black text-slate-800">{q.title}</h3>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                          <div>
                            <p className="text-indigo-600 font-black text-xs uppercase tracking-widest mb-3 border-b border-slate-50 pb-2">🦖 Male Ranking</p>
                            <div className="grid grid-cols-3 gap-2">{mr.map((r,i)=><RankCard key={i} res={r} accentClass="text-indigo-700"/>)}</div>
                          </div>
                          <div>
                            <p className="text-pink-500 font-black text-xs uppercase tracking-widest mb-3 border-b border-slate-50 pb-2">🎀 Female Ranking</p>
                            <div className="grid grid-cols-3 gap-2">{fr.map((r,i)=><RankCard key={i} res={r} accentClass="text-pink-600"/>)}</div>
                          </div>
                        </div>

                        {/* 抽選 */}
                        <div className="pt-4 border-t border-slate-100 flex flex-col items-center gap-6">
                          {adminUnlocked ? (
                            <button onClick={()=>runLottery(q.id)} disabled={!!lotteryQid}
                              className="w-full max-w-sm bg-amber-500 hover:bg-amber-600 disabled:opacity-60 text-white font-black rounded-2xl h-16 text-xl shadow-lg active:scale-95 transition-all">
                              {rolling?"🎰 抽選中...":"🎰 抽選"}
                            </button>
                          ) : (
                            <div className="w-full max-w-sm bg-slate-100 border-2 border-slate-200 text-slate-400 font-black rounded-2xl h-14 flex items-center justify-center gap-2 text-sm">
                              <I.LockSm/>当選者の抽選（管理者のみ）
                            </div>
                          )}
                          <div className="w-full max-w-sm">
                            <LotteryWidget rolling={rolling} winners={!rolling?qw:null}/>
                          </div>
                        </div>

                        {/* 次のお題 or 最終結果へ */}
                        <div className="pt-4 border-t border-slate-100">
                          {!isLast ? (
                            adminUnlocked ? (
                              <button onClick={revealNext} disabled={isRevealing}
                                className="w-full h-16 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-black rounded-2xl text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                {isRevealing?"発表中...":<>次のお題の結果を発表 <I.ChevR/></>}
                              </button>
                            ) : (
                              <div className="w-full h-14 bg-slate-100 border-2 border-slate-200 text-slate-400 font-black rounded-2xl flex items-center justify-center gap-2 text-sm">
                                <I.LockSm/>次のお題（管理者のみ）
                              </div>
                            )
                          ) : (
                            adminUnlocked ? (
                              <button onClick={()=>{ setShowFinal(true); fetchAI(); }}
                                className="w-full h-16 bg-slate-700 hover:bg-slate-800 text-white font-black rounded-2xl text-lg shadow-lg active:scale-95 transition-all">
                                🎊 最終結果・振り返りへ
                              </button>
                            ) : (
                              <div className="w-full h-14 bg-slate-100 border-2 border-slate-200 text-slate-400 font-black rounded-2xl flex items-center justify-center gap-2 text-sm">
                                <I.LockSm/>最終結果（管理者のみ）
                              </div>
                            )
                          )}
                        </div>
                      </div>
                    );
                  })()}

                  {/* 最終結果ページ */}
                  {resultsOpen && showFinal && (
                    <div className="space-y-8 anim-reveal-in">
                      <button onClick={saveImage} disabled={isSaving}
                        className="w-full h-12 bg-slate-700 hover:bg-slate-800 disabled:opacity-50 text-white font-black rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg text-sm">
                        {isSaving?<>保存中...</>:<><I.Img/>📸 最終結果を画像で保存</>}
                      </button>
                      <div ref={finalRef} className="space-y-6 bg-slate-50 p-4 rounded-2xl">
                        <div className="text-center space-y-1 py-2">
                          <div className="text-4xl">🎊</div>
                          <h2 className="text-3xl font-black text-slate-800">最終結果</h2>
                          <p className="text-slate-400 text-sm font-bold">全お題の振り返り</p>
                        </div>
                        {questions.map((q,qi)=>{
                          const mr=buildRanking(submissions,q.id,"male");
                          const fr=buildRanking(submissions,q.id,"female");
                          const qw=getQWinners(q.id);
                          return (
                            <div key={q.id} className="border-2 border-slate-100 rounded-2xl overflow-hidden bg-white">
                              <div className="bg-slate-700 px-5 py-3 text-white">
                                <p className="text-[10px] font-black opacity-60 uppercase tracking-widest">Q{qi+1}</p>
                                <h3 className="text-lg font-black">{q.title}</h3>
                              </div>
                              <div className="p-4 space-y-4">
                                <div>
                                  <p className="text-indigo-600 font-black text-xs mb-2 uppercase tracking-widest">🦖 Male</p>
                                  <div className="grid grid-cols-3 gap-2">{mr.map((r,i)=><RankCard key={i} res={r} accentClass="text-indigo-700"/>)}</div>
                                </div>
                                <div>
                                  <p className="text-pink-500 font-black text-xs mb-2 uppercase tracking-widest">🎀 Female</p>
                                  <div className="grid grid-cols-3 gap-2">{fr.map((r,i)=><RankCard key={i} res={r} accentClass="text-pink-600"/>)}</div>
                                </div>
                                {qw.length>0 && (
                                  <div className="bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-amber-200 rounded-xl p-3 flex items-center gap-3">
                                    <span className="text-2xl">🎰</span>
                                    <div>
                                      <p className="text-amber-500 font-black text-[10px] uppercase tracking-widest">抽選当選者</p>
                                      <div className="flex flex-wrap gap-2 mt-1">
                                        {qw.map((w,i)=><span key={i} className="text-amber-900 font-black">{w.nickname}<span className="text-xs text-amber-500 ml-0.5">様</span></span>)}
                                      </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                        {/* AI総評 */}
                        <div className="rounded-2xl border-2 border-purple-200 bg-purple-50 overflow-hidden">
                          <div className="bg-purple-500 px-5 py-3 text-white flex items-center gap-2">
                            <I.Stars/><span className="font-black text-sm">AIによる同窓会総評</span>
                          </div>
                          <div className="p-5">
                            {aiLoading ? (
                              <div className="flex items-center justify-center gap-3 py-6 text-purple-400">
                                <div className="w-5 h-5 border-2 border-purple-400 border-t-transparent rounded-full anim-garapon-spin"/>
                                <span className="font-black text-sm">AIが総評を考え中...</span>
                              </div>
                            ) : aiComment ? (
                              <div className="space-y-3">
                                <p className="text-slate-700 font-bold leading-relaxed text-sm whitespace-pre-wrap anim-fade-in">{aiComment}</p>
                                <div className="text-center pt-3 border-t border-purple-100">
                                  <button onClick={fetchAI} className="px-4 py-2 bg-purple-100 hover:bg-purple-200 text-purple-600 font-black rounded-xl text-xs active:scale-95 transition-all">🔄 総評を再生成する</button>
                                </div>
                              </div>
                            ) : (
                              <div className="text-center py-4">
                                <button onClick={fetchAI} className="px-6 py-3 bg-purple-500 hover:bg-purple-600 text-white font-black rounded-2xl active:scale-95 transition-all text-sm">✨ AI総評を生成する</button>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ 管理ページ ══ */}
        {mode==="admin" && (
          <div className="anim-fade-in">
            {!adminUnlocked ? (
              <div className="p-10 text-center space-y-6 rounded-3xl shadow-xl bg-white">
                <div className="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto text-slate-300"><I.Lock/></div>
                <h2 className="text-xl font-black italic">Admin Login</h2>
                <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}
                  className="w-full p-4 bg-slate-100 rounded-2xl text-center font-bold text-xl outline-none focus:ring-2 focus:ring-green-500" placeholder="••••"/>
                <button onClick={handleAdminLogin} className="w-full bg-slate-900 text-white rounded-2xl h-14 font-black">ログイン</button>
              </div>
            ) : (
              <div className="space-y-6 pb-20">

                <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 flex items-center gap-2 text-green-700 text-sm font-bold">
                  <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"/></svg>
                  Firebase リアルタイム接続中 — 全端末でデータが同期されます
                </div>

                {/* ゲームステータス */}
                <div className={"rounded-3xl shadow-xl overflow-hidden border-2 transition-all duration-500 "+(gameOpen?"border-green-300":"border-slate-200")}>
                  <div className={"p-5 font-black text-white flex items-center justify-between transition-all duration-500 "+(gameOpen?"bg-green-500":"bg-slate-500")}>
                    <div className="flex items-center gap-2"><I.Power/><span className="text-sm uppercase tracking-widest">ゲームステータス</span></div>
                    <span className="text-xs font-black px-3 py-1 rounded-full bg-white/25">{gameOpen?"● OPEN":"○ CLOSED"}</span>
                  </div>
                  <div className="p-6 space-y-4">
                    <p className="text-slate-500 text-sm font-bold">{gameOpen?"現在オープン中。投票・結果ページが全員に公開されています。":"現在クローズ中。管理ページ以外は「準備中」と表示されます。"}</p>
                    <div className="flex gap-3">
                      <button onClick={()=>db.ref(FK.GAME).set(true)}
                        className={"flex-1 h-14 rounded-2xl font-black text-sm transition-all border-2 "+(gameOpen?"bg-green-500 border-green-500 text-white shadow-lg":"bg-white border-slate-200 text-slate-400 hover:border-green-300 hover:text-green-500")}>
                        ✓　オープン
                      </button>
                      <button onClick={handleCloseGame}
                        className={"flex-1 h-14 rounded-2xl font-black text-sm transition-all border-2 "+(!gameOpen?"bg-slate-700 border-slate-700 text-white shadow-lg":"bg-white border-slate-200 text-slate-400 hover:border-slate-400 hover:text-slate-600")}>
                        ✕　クローズ
                      </button>
                    </div>
                    <p className="text-[10px] text-slate-400 font-bold">※ クローズするとニックネームロックが解除されます（候補者リスト・お題は維持）</p>
                  </div>
                </div>

                {/* お題管理 */}
                <div className="rounded-3xl shadow-xl bg-white overflow-hidden">
                  <div className="bg-slate-700 p-4 font-black text-white flex items-center gap-2">
                    <I.Trophy/> お題管理
                  </div>
                  <div className="p-4 space-y-4">
                    <div className="flex gap-2">
                      <input value={newQTitle} onChange={e=>setNewQTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addQ()}
                        className="flex-1 px-4 py-2.5 bg-slate-50 rounded-xl font-bold outline-none border-2 border-slate-100 focus:border-slate-400 text-sm" placeholder="新しいお題を追加..."/>
                      <button onClick={addQ} className="px-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl flex items-center"><I.Plus/></button>
                    </div>
                    <div className="max-h-72 overflow-y-auto sb space-y-1">
                      {questions.map((q,qi)=>(
                        <div key={q.id} className="flex items-center gap-2 bg-slate-50 rounded-xl p-3">
                          <div className="flex flex-col gap-0.5">
                            <button onClick={()=>moveQ(qi,-1)} disabled={qi===0} className="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-none font-black">▲</button>
                            <button onClick={()=>moveQ(qi,1)} disabled={qi===questions.length-1} className="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-none font-black">▼</button>
                          </div>
                          <span className="text-[10px] font-black text-slate-400 bg-slate-200 px-2 py-0.5 rounded-full">Q{qi+1}</span>
                          {editQId===q.id ? (
                            <input autoFocus value={editQText} onChange={e=>setEditQText(e.target.value)}
                              onKeyDown={e=>e.key==="Enter"&&saveQTitle(q.id,editQText)} onBlur={()=>saveQTitle(q.id,editQText)}
                              className="flex-1 px-2 py-1 rounded-lg border-2 border-indigo-300 text-sm font-bold outline-none"/>
                          ) : (
                            <span className="flex-1 text-sm font-bold text-slate-700 cursor-pointer" onClick={()=>{setEditQId(q.id);setEditQText(q.title);}}>{q.title}</span>
                          )}
                          <button onClick={()=>{setEditQId(q.id);setEditQText(q.title);}} className="text-slate-300 hover:text-indigo-500"><I.Edit/></button>
                          <button onClick={()=>removeQ(q.id)} className="text-slate-300 hover:text-red-500"><I.X/></button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* ラベル編集 */}
                <div className="rounded-3xl shadow-xl bg-white border-2 border-indigo-400 overflow-hidden">
                  <div className="bg-indigo-400 p-4 font-black text-white flex items-center gap-2"><I.Edit/> タイトル（ラベル）の編集</div>
                  <div className="p-6 flex gap-2">
                    <input value={tempLabel} onChange={e=>setTempLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&db.ref(FK.LABEL).set(tempLabel)}
                      className="flex-1 p-4 bg-slate-50 rounded-2xl font-black focus:ring-2 focus:ring-indigo-500 text-lg outline-none" placeholder="Election"/>
                    <button onClick={()=>db.ref(FK.LABEL).set(tempLabel)} className="bg-indigo-600 text-white rounded-2xl px-6 flex items-center"><I.Save/></button>
                  </div>
                </div>

                {/* 結果発表日時 */}
                <div className="rounded-3xl shadow-xl bg-white border-2 border-teal-300 overflow-hidden">
                  <div className="bg-teal-500 p-4 font-black text-white flex items-center gap-2"><I.Calendar/> 結果発表日時（カウントダウン）</div>
                  <div className="p-5 space-y-3">
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-[10px] font-black text-slate-400 block mb-1">日付</label>
                        <input type="date" value={tempDate} onChange={e=>setTempDate(e.target.value)}
                          className="w-full p-3 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-slate-100 focus:border-teal-400"/>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-400 block mb-1">時刻</label>
                        <input type="time" value={tempTime} onChange={e=>setTempTime(e.target.value)}
                          className="w-full p-3 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-slate-100 focus:border-teal-400"/>
                      </div>
                    </div>
                    <button onClick={setRevDT} className="w-full h-12 bg-teal-500 hover:bg-teal-600 text-white font-black rounded-2xl active:scale-95 transition-all">日時を設定する</button>
                    {revealAt && (
                      <div className="flex items-center justify-between text-xs font-bold text-teal-600 bg-teal-50 rounded-xl p-3">
                        <span>設定済み: {new Date(revealAt).toLocaleString("ja-JP")}</span>
                        <button onClick={()=>db.ref(FK.REVEAL_AT).set(null)} className="text-red-400 hover:text-red-600 font-black">✕ 削除</button>
                      </div>
                    )}
                  </div>
                </div>

                {/* 候補者リスト */}
                <div className="rounded-3xl shadow-xl bg-white overflow-hidden">
                  <div className="bg-slate-700 p-4 font-black text-white flex items-center gap-2">
                    <I.Users/> 候補者リスト（全お題共通）
                    <span className="ml-auto text-[10px] bg-slate-600 px-2 py-1 rounded-full">🔒 クローズをまたいで保持</span>
                  </div>
                  <div className="flex border-b border-slate-100">
                    {COLS.map(col=>(
                      <button key={col.id} onClick={()=>setAdminColTab(col.id)}
                        className={"flex-1 py-3 text-xs font-black transition-all "+(adminColTab===col.id?col.colorCls.tab:"text-slate-400 hover:bg-slate-50")}>
                        {col.label}
                      </button>
                    ))}
                  </div>
                  {COLS.map(col=>{
                    if(adminColTab!==col.id) return null;
                    return (
                      <div key={col.id} className="p-4 space-y-3">
                        <CandidateInput bgColor={col.colorCls.bg} onAdd={name=>addCandidate(col.id,name)}/>
                        <button
                          className="w-full text-[10px] font-black py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 hover:border-slate-300 flex items-center justify-center gap-1"
                          onClick={()=>setBulkModal({show:true,colId:col.id,text:""})}>
                          <I.ListPlus/> まとめて登録
                        </button>
                        <div className="max-h-64 overflow-y-auto sb space-y-1">
                          {(candidates[col.id]||[]).map((name,i)=>(
                            <div key={i} className="flex items-center gap-1 p-2 bg-slate-50 rounded-lg">
                              <div className="flex flex-col mr-1">
                                <button onClick={()=>moveCandidate(col.id,i,-1)} disabled={i===0} className="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-tight">▲</button>
                                <button onClick={()=>moveCandidate(col.id,i,1)} disabled={i===(candidates[col.id]||[]).length-1} className="text-slate-300 hover:text-slate-600 disabled:opacity-20 text-xs leading-tight">▼</button>
                              </div>
                              <span className="flex-1 text-sm font-bold">{name}</span>
                              <button onClick={()=>removeCandidate(col.id,i)} className="text-slate-300 hover:text-red-500 transition-colors"><I.X/></button>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 結果公開 / 当選人数 / お題インデックス */}
                <div className="rounded-3xl shadow-xl bg-white p-6 space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center block">結果公開</label>
                      <button onClick={()=>db.ref(FK.RESULTS).set(!resultsOpen)}
                        className={"w-full font-black rounded-2xl h-12 transition-all "+(resultsOpen?"bg-blue-600 text-white shadow":"bg-slate-100 text-slate-400 hover:bg-slate-200")}>
                        {resultsOpen?"公開中 ✓":"非公開"}
                      </button>
                    </div>
                    <div className="space-y-1">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center block">当選人数</label>
                      <input type="number" min="1" value={winnerCount}
                        onChange={e=>db.ref(FK.WIN_COUNT).set(Math.max(1,parseInt(e.target.value)||1))}
                        className="w-full p-3 bg-slate-100 rounded-2xl text-center font-black text-xl outline-none focus:ring-2 focus:ring-amber-500"/>
                    </div>
                  </div>
                  {resultsOpen && (
                    <div className="space-y-1">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center block">表示中のお題インデックス</label>
                      <div className="flex items-center justify-between bg-blue-50 rounded-2xl p-3 gap-2">
                        <button onClick={()=>db.ref(FK.REV_IDX).set(Math.max(0,revealIndex-1))} className="w-10 h-10 bg-white rounded-xl font-black text-slate-600 hover:bg-slate-100 shadow-sm">◀</button>
                        <span className="font-black text-blue-700 text-lg">{revealIndex+1} / {questions.length}</span>
                        <button onClick={()=>db.ref(FK.REV_IDX).set(Math.min(questions.length-1,revealIndex+1))} className="w-10 h-10 bg-white rounded-xl font-black text-slate-600 hover:bg-slate-100 shadow-sm">▶</button>
                      </div>
                    </div>
                  )}
                </div>

                {/* データリセット */}
                <div className="rounded-3xl shadow-xl bg-white overflow-hidden border-2 border-red-100">
                  <div className="bg-red-50 p-4 font-black text-red-400 flex items-center gap-2 text-sm uppercase tracking-widest">
                    <I.Refresh/> 投票データリセット
                  </div>
                  <div className="p-6 space-y-3">
                    <p className="text-slate-500 text-sm font-bold">回答データ・抽選結果・結果表示をリセットします。</p>
                    <div className="text-[11px] font-bold bg-slate-50 rounded-xl p-3 space-y-1 text-slate-500">
                      <p>✅ 候補者リスト・お題はそのまま保持されます</p>
                      <p>🗑️ 回答データ・抽選結果のみリセット</p>
                    </div>
                    <button onClick={()=>setShowResetModal(true)}
                      className="w-full h-14 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                      <I.Refresh/> 投票データをリセット
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* 一括登録モーダル */}
      {bulkModal.show && (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="anim-bounce-in bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl space-y-4">
            <h3 className="text-lg font-black text-center">{COLS.find(c=>c.id===bulkModal.colId)?.label} を一括登録</h3>
            <p className="text-[10px] text-slate-400 font-bold text-center">改行・カンマ・読点で区切って入力してください</p>
            <textarea rows={10} value={bulkModal.text} onChange={e=>setBulkModal(prev=>({...prev,text:e.target.value}))}
              className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-indigo-500 resize-none"/>
            <div className="flex gap-2">
              <button onClick={()=>setBulkModal({show:false,colId:"c11m",text:""})} className="flex-1 p-3 font-bold text-slate-600 bg-slate-100 rounded-xl">キャンセル</button>
              <button onClick={processBulk} className="flex-1 p-3 bg-slate-900 text-white font-bold rounded-xl">登録実行</button>
            </div>
          </div>
        </div>
      )}

      {/* リセット確認モーダル */}
      {showResetModal && (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="anim-bounce-in bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl space-y-6">
            <div className="text-center space-y-2">
              <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto text-red-500"><I.Refresh/></div>
              <h3 className="text-xl font-black text-slate-800">投票データをリセット</h3>
              <p className="text-slate-400 text-sm font-bold">回答データ・抽選結果がリセットされます。</p>
              <p className="text-[11px] text-slate-400 bg-slate-50 rounded-xl p-2">候補者リスト・お題は維持されます</p>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>setShowResetModal(false)} className="flex-1 h-12 font-black rounded-2xl bg-slate-100 hover:bg-slate-200 text-slate-600">キャンセル</button>
              <button onClick={handleReset} className="flex-1 h-12 bg-red-500 hover:bg-red-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">リセット</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
